<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    /* Flavora Auth Guard — redirect to login if not signed in */
    (function() {
      try {
        var u = JSON.parse(localStorage.getItem('ek_user') || 'null');
        if (!u) { localStorage.setItem('ek_return_to', location.pathname + location.search); location.replace('login.html'); }
      } catch(e) { location.replace('login.html'); }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Flavora</title>
  <meta name="description" content="Your recipe portfolio, bookmarks, and culinary journey." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Profile Header ── */
    .profile-banner {
      background: linear-gradient(135deg, #1C2A14 0%, #2D5016 60%, #3D7020 100%);
      height: 180px; position: relative; border-radius: 0 0 var(--radius-xl) var(--radius-xl);
    }
    .profile-header { padding: 0 0 2rem; }
    .profile-header-inner {
      display: flex; align-items: flex-end; gap: 2rem;
      padding: 0 2rem;
      flex-wrap: wrap;
    }
    .profile-avatar {
      width: 100px; height: 100px;
      border-radius: 50%; border: 4px solid var(--white);
      font-size: 2.4rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: -50px;
      box-shadow: var(--shadow-md);
    }
    .profile-info { flex: 1; }
    .profile-stats { display: flex; gap: 2rem; margin: 1rem 0; }
    .stat-item { text-align: left; }
    .stat-num   { display: block; font-size: 1.3rem; font-weight: 700; color: var(--charcoal); }
    .stat-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
    .profile-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .follow-toggle-btn.following {
      background: var(--green-pale); border-color: var(--green); color: var(--green);
    }

    /* ── Tabs ── */
    .profile-tabs {
      display: flex; gap: 0; border-bottom: 2px solid var(--border);
      margin-bottom: 2rem;
    }
    .profile-tab {
      padding: 12px 24px; font-size: 0.85rem; font-weight: 600;
      color: var(--text-muted); background: none; border: none;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      cursor: pointer; letter-spacing: 0.03em;
      transition: all var(--transition);
    }
    .profile-tab.active { color: var(--green); border-bottom-color: var(--green); }
    .profile-tab:hover  { color: var(--charcoal); }

    /* Recipe Grid */
    #recipe-grid { min-height: 200px; }

    /* ── Edit Modal ── */
    #edit-profile-modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    .modal-content {
      background: var(--white); width: 92%; max-width: 440px; border-radius: var(--radius-lg);
      padding: 2rem; box-shadow: var(--shadow-lg); animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-title { font-family: var(--font-serif); font-size: 1.4rem; margin-bottom: 0.5rem; }
    .modal-sub   { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    .modal-input-group { margin-bottom: 1.2rem; }
    .modal-label { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 6px; }
    .modal-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .modal-input:focus { border-color: var(--green); }
    .modal-actions { display: flex; gap: 10px; margin-top: 2rem; }
    .modal-btn { flex: 1; padding: 12px; border-radius: 999px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
    .modal-btn-save   { background: var(--green); color: white; }
    .modal-btn-save:hover { background: var(--green-mid); transform: translateY(-1px); }
    .modal-btn-cancel { background: var(--cream-dark); color: var(--text-muted); }

    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body>

<!-- ── Navigation ─────────────────────────────────────────────── -->
<nav class="nav">
  <div class="nav-logo">Flavora</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="feed.html">Feed</a></li>
    <li><a href="upload.html">Upload</a></li>
    <li><a href="tastemakers.html">Tastemakers</a></li>
  </ul>
  <div class="nav-right" id="nav-right-placeholder">
    <div class="nav-search">
      <span class="icon">🔍</span>
      <input type="search" placeholder="Search…" />
    </div>
    <div class="nav-avatar" onclick="location.href='profile.html'" title="My Profile">S</div>
  </div>
</nav>

<main>
  <!-- Banner -->
  <div class="profile-banner"></div>

  <div class="container">
    <!-- Profile Header — injected by profile.js -->
    <div class="profile-header" id="profile-header">
      <div class="skeleton" style="height:160px;border-radius:14px;margin-top:1rem"></div>
    </div>

    <!-- Tabs -->
    <div class="profile-tabs">
      <button class="profile-tab active" data-tab="recipes">🍽️ Recipes</button>
      <button class="profile-tab" data-tab="bookmarks">🔖 Saved</button>
      <button class="profile-tab" data-tab="liked">❤️ Liked</button>
    </div>

    <!-- Recipe Grid -->
    <div class="grid-3" id="recipe-grid">
      <div class="skeleton" style="height:220px;border-radius:14px"></div>
      <div class="skeleton" style="height:220px;border-radius:14px"></div>
      <div class="skeleton" style="height:220px;border-radius:14px"></div>
    </div>
  </div>
</main>

<!-- ── Edit Profile Modal ───────────────────────────────────── -->
<div id="edit-profile-modal">
  <div class="modal-content">
    <h3 class="modal-title">Edit Profile</h3>
    <p class="modal-sub">Update your public presence on Flavora.</p>
    
    <div class="modal-input-group">
      <label class="modal-label">Display Name</label>
      <input type="text" id="edit-name" class="modal-input" placeholder="Your name (e.g. Elena Rossi)" />
    </div>
    
    <div class="modal-input-group">
      <label class="modal-label">Bio</label>
      <textarea id="edit-bio" class="modal-input" rows="3" placeholder="Tell your culinary story..."></textarea>
    </div>
    
    <div class="modal-input-group">
      <label class="modal-label">Phone Number (for OTP)</label>
      <input type="tel" id="edit-phone" class="modal-input" placeholder="e.g. +91 9876543210" />
    </div>

    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="modal-btn modal-btn-save" id="save-profile-btn" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<!-- ── Footer ────────────────────────────────────────────────── -->
<footer class="footer" style="margin-top:4rem">
  <div class="container footer-inner">
    <div>
      <div class="footer-logo">Flavora</div>
      <div class="footer-copy">© 2026 Flavora by Sam. Crafted for the Digital Epicurean.</div>
    </div>
    <ul class="footer-links">
      <li><a href="#">About</a></li>
      <li><a href="tastemakers.html">Community</a></li>
      <li><a href="feed.html">Recipes</a></li>
    </ul>
  </div>
</footer>

<script src="js/app.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
